<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Pro: Опануйте професійну роботу з таблицями</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="hero-grid-right"></div>

   
       
      <div class="hero-decor-layer">
        <div class="decor-squares">
  <div class="sq sq-sm sq-pos-1"></div>
  <div class="sq sq-sm sq-pos-2"></div>
  <div class="sq sq-sm sq-pos-3"></div>

  <div class="sq sq-lg sq-pos-4"></div>
  <div class="sq sq-lg sq-pos-5"></div>
</div>
      <div class="vector-decor">
   <img src="images/Vector.svg" alt="Arrow" class="arrow-svg">
</div>
        <img
          src="images/1411.jpg"
          alt="Excel Dashboard"
          class="hero-decor-img"
        />
    <ul class="formula-list">
  <li class="formula f-min">f(x) = MIN(E2:E5)</li>
 <li class="formula f-sum-ab">
  <img src="images/SUM(A1+B4).svg" alt="SUM formula decor">
</li>
  <li class="formula f-sumif">SUMIF(C3:C12, "70,000")</li>
  <li class="formula f-average">
  <img src="images/AVERAGE(B2+D2).svg" alt="AVERAGE formula decor">
</li>
<li class="formula f-layer">
  <img src="images/Layer_1.svg" alt="Layer formula decor">
</li>
</ul>

      <div class="container hero-wrapper">
        <div class="content-block">
          <div class="logo">
  <img src="images/logo.svg" alt="GO IT Logo">
</div>
          <div class="status-tags">
            <span class="tag tag-first"><span>Безоплатний вебінар</span></span>
            <span class="tag tag-bordered">Старт: <span>  10 січня 19:30</span></span>
          </div>
          <h1>Навчіться створювати Excel-таблиці на pro-рівні</h1>
          <p class="description">
            Опануйте функціонал Microsoft Excel, автоматизуйте свою роботу та
            створюйте таблиці швидко і в задоволення
          </p>
          <button
            id="openModalBtn"
            class="submit-btn"
            style="width: auto; padding: 15px 30px; margin-top: 20px"
          >
            Зареєструватися (модалка)
          </button>
        </div>

       <div class="form-block" id="main-form-slot"></div>
      </div>
      
    </section>

    <div id="modal" class="modal-overlay" style="display: none">
      <div class="modal-content">
        <button id="closeBtn" class="close-btn">&times;</button>
        <div id="modal-form-slot"></div>
      </div>
    </div>

   <template id="form-template">
  <form class="reg-form"> <h3>Реєструйся просто зараз</h3>

    <div class="countdown">
      <div class="unit"><span class="days">00</span><label>днів</label></div>
      <span class="divider">:</span>
      <div class="unit"><span class="hours">00</span><label>годин</label></div>
      <span class="divider">:</span>
      <div class="unit"><span class="minutes">00</span><label>хвилин</label></div>
      <span class="divider">:</span>
      <div class="unit seconds-green"><span class="seconds">00</span><label>секунд</label></div>
    </div> <div class="input-group">
      <input type="text" name="name" placeholder="Введіть своє ім’я" />
      <input type="email" name="email" placeholder="Введіть свій E-mail" />
      <div class="phone-wrapper">
        <img src="images/flag.svg" alt="flag" class="flag-svg">
        <input type="tel" name="phone" placeholder="+380 95 -- -- ---" />
      </div>
    </div>

    <label class="checkbox-container">
      <input type="checkbox" name="agree" />
      <span class="checkmark"></span>
      <span class="text">Згоден з <a href="#">Політикою конфіденційності</a> та <a href="#">Умови користування послугами</a></span>
    </label>

    <button type="submit" class="submit-btn">Зареєструватися</button>
  </form> </template>

    <script src="script.js"></script>
  </body>
</html>
