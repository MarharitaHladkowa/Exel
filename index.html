<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Pro: Опануйте професійну роботу з таблицями</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="hero-grid-right"></div>
      <div class="hero-decor-layer">
        <div class="vector-decor">
          <svg
            width="153"
            height="262"
            viewBox="0 0 153 262"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M23.8168 245.491C23.6782 245.744 23.4817 245.896 23.2637 245.882C20.6838 245.727 18.2627 246.697 15.7003 247.724C13.699 248.528 11.6292 249.358 9.47049 249.604"
              stroke="#0F7C41"
              stroke-opacity="0.4"
              stroke-width="2"
            />
          </svg>
        </div>
        <img
          src="images/1411.jpg"
          alt="Excel Dashboard"
          class="hero-decor-img"
        />
        <span class="formula f-min">f(x) = MIN(E2:E5)</span>
        <span class="formula f-sumif">SUMIF(C3:C12, "70,000")</span>
        <span class="formula f-average">AVERAGE(B2+D2)</span>
      </div>

      <div class="container hero-wrapper">
        <div class="content-block">
          <div class="logo">GO IT</div>
          <div class="status-tags">
            <span class="tag tag-filled">Безоплатний вебінар</span>
            <span class="tag tag-bordered">Старт: 10 січня 19:30</span>
          </div>
          <h1>Навчіться створювати Excel-таблиці на pro-рівні</h1>
          <p class="description">
            Опануйте функціонал Microsoft Excel, автоматизуйте свою роботу та
            створюйте таблиці швидко і в задоволення
          </p>
          <button
            id="openModalBtn"
            class="submit-btn"
            style="width: auto; padding: 15px 30px; margin-top: 20px"
          >
            Зареєструватися (модалка)
          </button>
        </div>

        <div class="form-block" id="main-form-slot"></div>
      </div>
    </section>

    <div id="modal" class="modal-overlay" style="display: none">
      <div class="modal-content">
        <button id="closeBtn" class="close-btn">&times;</button>
        <div id="modal-form-slot"></div>
      </div>
    </div>

    <template id="form-template">
      <form class="reg-form">
        <h3>Реєструйся просто зараз</h3>

        <div class="countdown">
          <div class="unit">
            <span class="days">00</span><label>днів</label>
          </div>
          <span class="divider">:</span>
          <div class="unit">
            <span class="hours">00</span><label>годин</label>
          </div>
          <span class="divider">:</span>
          <div class="unit">
            <span class="minutes">00</span><label>хвилин</label>
          </div>
          <span class="divider">:</span>
          <div class="unit">
            <span class="seconds">00</span><label>секунд</label>
          </div>
        </div>

        <div class="input-group">
          <input type="text" name="name" placeholder="Введіть своє ім’я" />
          <input type="email" name="email" placeholder="Введіть свій E-mail" />
          <div class="phone-wrapper">
            <span class="flag">🇺🇦</span>
            <input type="tel" name="phone" placeholder="+380 95 --- -- --" />
          </div>
        </div>

        <label class="checkbox-container">
          <input type="checkbox" name="agree" checked />
          <span class="checkmark"></span>
          <span class="text"
            >Згоден з <a href="#">Політикою конфіденційності</a></span
          >
        </label>

        <button type="submit" class="submit-btn">Зареєструватися</button>
      </form>
    </template>

    <script src="script.js"></script>
  </body>
</html>
